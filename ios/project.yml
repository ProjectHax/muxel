# XcodeGen project definition for the muxel iOS companion app.
#
# The .xcodeproj is generated (and git-ignored). To build:
#   brew install xcodegen
#   cd ios && xcodegen generate && open Muxel.xcodeproj
#
# This app is independent of the Rust cargo workspace; `cargo` does not build it.
name: Muxel
options:
  bundleIdPrefix: dev.muxel
  deploymentTarget:
    iOS: "17.0" # Citadel 0.12+ requires iOS 17 / macOS 14; also AsyncStream.makeStream()
  createIntermediateGroups: true
  groupSortPosition: top

# Dependencies tracked at their latest releases (`from:` = that version up to the
# next major, so SPM picks up patch/minor updates). Citadel 0.12+ raised its floor to
# iOS 17 / macOS 14 — hence the deployment target above.
packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.12.1"
  # Terminal emulator for the live SSH PTY terminal (renders the tmux/agent UI,
  # handles VT/ANSI, input, resize).
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # set your Apple Developer team id (or in Xcode signing)
    CODE_SIGN_STYLE: Automatic

targets:
  Muxel:
    type: application
    platform: iOS
    sources:
      - path: Muxel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.muxel.ios
        PRODUCT_NAME: muxel
        PRODUCT_MODULE_NAME: muxel
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Muxel/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Muxel/App/Muxel.entitlements
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: Citadel
      - package: SwiftTerm
    scheme:
      testTargets:
        - MuxelTests
      gatherCoverageData: false

  MuxelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MuxelTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.muxel.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        # The app's PRODUCT_NAME is lowercase `muxel`, so the host app bundle is
        # `muxel.app/muxel` (not the target-named `Muxel.app/Muxel` XcodeGen assumes).
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/muxel.app/muxel"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Muxel
