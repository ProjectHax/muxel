name: release

# Push a tag like `v0.1.0` to build distributable packages on each OS and attach
# them to a GitHub Release. Can also be run manually (workflow_dispatch) to build
# the packages as artifacts without cutting a release. GPUI can't be
# cross-compiled across OSes, so each OS builds on its own native runner.
#
# Outputs:
#   Linux   — .deb, .rpm, AppImage, .tar.gz (x86_64 + aarch64)
#   macOS   — a universal .app (Intel x86_64 + Apple Silicon) inside a .dmg + .zip
#   Windows — portable .zip + an Inno Setup installer .exe (x86_64 + arm64)
#
# Linux aarch64 builds on a native ARM64 runner. GPUI can't be cross-compiled
# across OSes, so each OS builds on its own runner; within macOS, x86_64 is
# cross-compiled from the Apple Silicon runner (cross-arch in one OS is fine).
#
# Windows artifacts (the portable .zip's muxel.exe and the installer .exe) are
# Authenticode-signed out of band after the build, via Azure Trusted Signing —
# run `scripts/sign-windows.sh --release <tag>` once the release exists (it
# re-uploads the signed zips and installers).
#
# macOS is signed + notarized in-job by scripts/sign-macos.sh when the MACOS_*
# secrets (a paid Apple Developer ID + an App Store Connect notary key) are
# configured; without them it falls back to ad-hoc signing and Gatekeeper still
# warns. See scripts/sign-macos.sh for the exact secrets and how to obtain them.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ----------------------------------------------------------------------------
  # Linux: build the release binary once, then reuse it for every package format.
  # ----------------------------------------------------------------------------
  linux-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld cmake pkg-config \
            libfontconfig-dev libfreetype6-dev \
            libwayland-dev wayland-protocols \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libx11-dev libx11-xcb-dev \
            libasound2-dev libvulkan-dev libdbus-1-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p muxel
      - uses: actions/upload-artifact@v7
        with:
          name: linux-build-bin-${{ matrix.arch }}
          path: target/release/muxel
          if-no-files-found: error

  # ----------------------------------------------------------------------------
  # Linux packages off the prebuilt binary: .deb, .rpm, AppImage, .tar.gz.
  # ----------------------------------------------------------------------------
  linux-packages:
    needs: linux-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Fetch prebuilt binary
        uses: actions/download-artifact@v8
        with:
          name: linux-build-bin-${{ matrix.arch }}
          path: target/release
      - run: chmod +x target/release/muxel
      - name: Install packaging deps
        run: |
          # Runtime libs so cargo-deb's `$auto` dependency detection
          # (dpkg-shlibdeps) can resolve sonames to packages.
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1 libfreetype6 libwayland-client0 \
            libxkbcommon0 libxkbcommon-x11-0 libxcb1 libx11-6 libx11-xcb1 \
            libasound2 libvulkan1 libdbus-1-3 \
            libwebkit2gtk-4.1-0 libgtk-3-0
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y cargo-deb cargo-generate-rpm

      - name: Build .deb
        run: cargo deb --no-build -p muxel

      - name: Build .rpm
        run: cargo generate-rpm -p crates/muxel

      - name: Build .tar.gz
        run: |
          set -eux
          stage="muxel-linux-${{ matrix.arch }}"
          mkdir -p "$stage"
          cp target/release/muxel "$stage/"
          cp README.md LICENSE "$stage/"
          cp packaging/muxel.desktop "$stage/"
          cp crates/muxel/assets/muxel.svg "$stage/"
          tar -czf "$stage.tar.gz" "$stage"

      - name: Build AppImage
        run: |
          set -eux
          arch="${{ matrix.arch }}"
          # GitHub runners lack FUSE; run the AppImage tools by self-extracting.
          export APPIMAGE_EXTRACT_AND_RUN=1
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${arch}.AppImage"
          chmod +x "linuxdeploy-${arch}.AppImage"
          mkdir -p AppDir

          # muxel hard-links the system GTK3 + WebKitGTK (the `muxel --browser`
          # helper window). WebKit can't be carried inside an AppImage — it
          # spawns fixed-path helper processes — so the *whole* GTK/GLib stack
          # has to come from the host, not just its top layer.
          #
          # linuxdeploy flattens the executable's transitive closure, so
          # excluding only libgtk-3/libwebkit2gtk still bundles everything
          # underneath them (glib, pango, cairo, ICU, GStreamer, ...). The
          # bundled libglib-2.0 from this 22.04 runner then shadows the host's
          # via LD_LIBRARY_PATH, and the host's libgtk-3 -> libjson-glib fails
          # to resolve symbols added in later glib:
          #
          #     symbol lookup error: libjson-glib-1.0.so.0:
          #     undefined symbol: g_once_init_leave_pointer
          #
          # which killed the AppImage at startup on every glib >= 2.80 distro
          # (RHEL 10, Fedora 40+, Ubuntu 24.04). So exclude every soname in the
          # system GTK/WebKit closure, keeping only the leaf libraries gpui
          # itself links (dbus/xcb/xkbcommon + libxcb's X deps), which stay
          # bundled for hosts that lack them.
          roots=(libgtk-3.so.0 libgdk-3.so.0 libwebkit2gtk-4.1.so.0
                 libjavascriptcoregtk-4.1.so.0 libsoup-3.0.so.0)
          keep='^(libdbus-1|libxcb|libxkbcommon|libXau|libXdmcp)[-.]'
          {
            for root in "${roots[@]}"; do
              echo "$root"
              path=$(ldconfig -p | awk -v n="$root" '$1 == n { print $NF; exit }')
              if [ -n "$path" ]; then ldd "$path" | awk '{ print $1 }'; fi
            done
          } | grep '^lib.*\.so' | sed 's/\.so.*/.so*/' | sort -u \
            | grep -Ev "$keep" > appimage-excludes.txt
          cat appimage-excludes.txt

          # If the closure didn't resolve, the list would be just the roots and
          # we'd silently ship the bug again.
          grep -qxF 'libglib-2.0.so*' appimage-excludes.txt \
            || { echo "::error::could not resolve the system GTK/WebKit closure"; exit 1; }

          exclude_args=()
          while read -r lib; do
            exclude_args+=(--exclude-library "$lib")
          done < appimage-excludes.txt

          "./linuxdeploy-${arch}.AppImage" \
            --appdir AppDir \
            --executable target/release/muxel \
            --desktop-file packaging/muxel.desktop \
            --icon-file crates/muxel/assets/muxel.png \
            "${exclude_args[@]}" \
            --output appimage

          # Belt and braces: any bundled GLib/GTK library shadows the host's and
          # breaks startup on newer distros. Fail the build instead of shipping.
          if ls AppDir/usr/lib 2>/dev/null | grep -Eq '^lib(glib-2\.0|gobject-2\.0|gio-2\.0|gmodule-2\.0|gtk-3|gdk-3|pango|cairo|webkit2gtk)'; then
            echo "::error::AppImage bundled part of the GTK/GLib stack; it must come from the host"
            ls AppDir/usr/lib
            exit 1
          fi

          # linuxdeploy names it after the desktop "Name"; normalize it.
          mv muxel*-"${arch}".AppImage "muxel-linux-${arch}.AppImage" 2>/dev/null \
            || mv muxel*.AppImage "muxel-linux-${arch}.AppImage"

      - uses: actions/upload-artifact@v7
        with:
          name: muxel-linux-packages-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            muxel-linux-${{ matrix.arch }}.tar.gz
            muxel-linux-${{ matrix.arch }}.AppImage

  # ----------------------------------------------------------------------------
  # macOS — a single UNIVERSAL app (Intel x86_64 + Apple Silicon aarch64 in one
  # binary via `lipo`). Both arches build on Apple Silicon — aarch64 natively,
  # x86_64 cross-compiled (Apple's toolchain handles x86_64<->arm64 within macOS),
  # avoiding the Intel macos-13 runner Apple is retiring. Bundles muxel.app and
  # ships one .dmg + .zip that runs on any Mac.
  # ----------------------------------------------------------------------------
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin
      # rust-toolchain.toml pins the channel, so `targets:` above lands on the
      # wrong toolchain — add them to the pinned one that cargo actually uses.
      - run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build both architectures
        run: |
          cargo build --release --target x86_64-apple-darwin -p muxel
          cargo build --release --target aarch64-apple-darwin -p muxel
      - name: Install icon tooling
        run: brew install librsvg
      - name: Build universal muxel.app
        run: |
          set -eux
          app="muxel.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          # Fuse the two arch binaries into one universal Mach-O.
          lipo -create -output "$app/Contents/MacOS/muxel" \
            target/x86_64-apple-darwin/release/muxel \
            target/aarch64-apple-darwin/release/muxel
          lipo -info "$app/Contents/MacOS/muxel"
          cp packaging/macos/Info.plist "$app/Contents/Info.plist"

          # SVG -> .icns (standard iconset sizes + @2x retina variants).
          mkdir -p muxel.iconset
          for s in 16 32 128 256 512; do
            rsvg-convert -w "$s" -h "$s" crates/muxel/assets/muxel.svg \
              -o "muxel.iconset/icon_${s}x${s}.png"
            d=$((s * 2))
            rsvg-convert -w "$d" -h "$d" crates/muxel/assets/muxel.svg \
              -o "muxel.iconset/icon_${s}x${s}@2x.png"
          done
          iconutil -c icns muxel.iconset -o "$app/Contents/Resources/muxel.icns"
      # The two per-arch release trees (multi-GB GPUI builds each) are now fused
      # into muxel.app via lipo, so they're dead weight — deleting them frees the
      # headroom hdiutil needs to build the .dmg (packaging previously ran the
      # runner out of disk at `hdiutil create`).
      - name: Free disk before packaging
        run: |
          set -eux
          df -h /
          rm -rf target/x86_64-apple-darwin target/aarch64-apple-darwin
          df -h /
      # Signs with a Developer ID + notarizes when the MACOS_* secrets are set,
      # otherwise ad-hoc signs. Either way, writes the .dmg and .zip.
      - name: Sign, notarize + package
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: scripts/sign-macos.sh muxel.app "muxel-macos-universal"
      - uses: actions/upload-artifact@v7
        with:
          name: muxel-macos-universal
          if-no-files-found: error
          path: |
            muxel-macos-universal.dmg
            muxel-macos-universal.zip

  # ----------------------------------------------------------------------------
  # Windows (x86_64 + arm64): portable .zip per architecture. arm64 is
  # cross-compiled with the MSVC ARM64 tools bundled in the windows-2022 image.
  # ----------------------------------------------------------------------------
  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            name: muxel-windows-x86_64
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            name: muxel-windows-arm64
            arch: arm64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # rust-toolchain.toml pins the channel, so `targets:` above lands on the
      # wrong toolchain — add it to the pinned one that cargo actually uses
      # (the windows-2022 runner only preinstalls the x86_64 target, not arm64).
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} -p muxel
      - name: Package .zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/muxel.exe" dist/
          Copy-Item README.md, LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.name }}.zip"
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # ISCC is the Inno Setup compiler; install it from Chocolatey.
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          # Version = the only line-anchored `version = "..."` in the root
          # Cargo.toml (the workspace package), so this works for both tag pushes
          # and manual workflow_dispatch runs.
          $ver = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          # Inno resolves [Files] / SetupIconFile paths relative to the .iss file's
          # OWN directory, not the cwd — so pass ABSOLUTE source/asset/output dirs.
          $root = (Get-Location).Path
          & $iscc "/DMyAppVersion=$ver" "/DMyArch=${{ matrix.arch }}" `
            "/DSourceDir=$root\dist" "/DAssetDir=$root\crates\muxel\assets" `
            "/O$root" `
            "$root\packaging\windows\muxel.iss"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          if-no-files-found: error
          path: |
            ${{ matrix.name }}.zip
            ${{ matrix.name }}-setup.exe

  # ----------------------------------------------------------------------------
  # Collect every package and attach to the GitHub Release (tag pushes only).
  # The intermediate `linux-build-bin-*` artifacts are excluded via the pattern.
  # ----------------------------------------------------------------------------
  release:
    needs: [linux-packages, macos, windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      # Needed for CHANGELOG.md below. Checked out at the tag, so the notes are
      # the ones the release was actually cut with.
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: muxel-*
          merge-multiple: true
      # The release notes are the changelog section for this version.
      #
      # GitHub's generated notes are built from *pull requests*, so anything
      # pushed straight to master is silently absent from the release page — 0.1.3
      # went out announcing two of its six changes for exactly that reason. The
      # changelog doesn't care how a commit arrived.
      - name: Take the release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v header="## [$version]" '
            index($0, header) == 1 { found = 1; next }   # the version heading
            found && /^## \[/      { exit }              # the next version ends it
            found                  { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            echo "release notes from CHANGELOG.md [$version]:"
            cat RELEASE_NOTES.md
          else
            echo "::warning::no '## [$version]' section in CHANGELOG.md — the release will carry only the generated notes"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          # The changelog section is the body; GitHub appends its generated
          # "What's Changed" and contributor list underneath it, so PR credit
          # (e.g. a first-time contributor) is still given.
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
